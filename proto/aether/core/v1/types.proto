syntax = "proto3";

package aether.core.v1;

// mirrors: aether_core::ids, aether_core::time, aether_core::decimal
// Canonical scalar types used across all AETHER service contracts.

import "google/protobuf/timestamp.proto";

// Money value with ISO-4217 or crypto asset tag.
// mirrors: aether_core::ids::Money
message Money {
  string amount = 1;
  string currency = 2;
}

// mirrors: aether_core::ids::Ulid
message Ulid {
  string value = 1;
}

// mirrors: aether_core::ids::MarketKey
message MarketKey {
  string value = 1;
}

// mirrors: aether_core::ids::VenueId
message VenueId {
  string value = 1;
}

// mirrors: aether_core::time::UtcTime
message UtcTime {
  google.protobuf.Timestamp ts = 1;
}

// mirrors: aether_core::decimal::Confidence
message Confidence {
  string value = 1;  // decimal string, 0..=1
}

// mirrors: aether_core::audit::AuditEvent
message AuditEvent {
  uint64 seq = 1;
  string prev_hash = 2;
  string hash = 3;
  google.protobuf.Timestamp ts = 4;
  string actor = 5;
  string action = 6;
  string subject = 7;
  string payload_hash = 8;
}

// Error envelope for all surfaces.
// mirrors: aether_core::error::ErrorEnvelope
message ErrorEnvelope {
  ErrorCode code = 1;
  string message = 2;
  bool retryable = 3;
  Ulid trace_id = 4;
  optional string details = 5;
}

// mirrors: aether_core::error::ErrorCode
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_ARGUMENT = 1;
  ERROR_CODE_UNAUTHENTICATED = 2;
  ERROR_CODE_PERMISSION_DENIED = 3;
  ERROR_CODE_NOT_FOUND = 4;
  ERROR_CODE_FAILED_PRECONDITION = 5;
  ERROR_CODE_UNAVAILABLE = 6;
  ERROR_CODE_DEADLINE_EXCEEDED = 7;
  ERROR_CODE_QUARANTINED = 8;
  ERROR_CODE_INTERNAL = 9;
}
