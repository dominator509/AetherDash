# ================================================================
# AETHER Terminal — Production Data Stack
# EP-407: Infrastructure services for the production deployment.
# AETHER application services run as systemd units on the host;
# this compose file provides the shared data layer.
#
# Differences from infra/dev/docker-compose.yml:
#   - Ports bind to 127.0.0.1 only (no external exposure)
#   - Resource limits applied per container
#   - Named volumes with production-suitable names
#   - Internal network for container-to-container communication
#   - Restart: always (not unless-stopped) for production resilience
#   - Logging configured for json-file driver
# ================================================================

services:

  # ── Postgres (pgvector) ──────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: ${AETHER_PG_PASSWORD}
      POSTGRES_DB: aether
    volumes:
      - aether_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - aether-infra
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── ClickHouse ───────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    restart: always
    ports:
      - "127.0.0.1:8123:8123"      # HTTP interface
      - "127.0.0.1:9004:9000"      # Native protocol (remapped; MinIO owns host 9000)
    environment:
      CLICKHOUSE_DB: aether
      CLICKHOUSE_USER: aether
      CLICKHOUSE_PASSWORD: ${AETHER_CLICKHOUSE_PASSWORD}
    volumes:
      - aether_ch_data:/var/lib/clickhouse
      - ../clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - aether-infra
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - aether_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli PING | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M
    networks:
      - aether-infra
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Qdrant ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.18.2
    restart: always
    ports:
      - "127.0.0.1:6333:6333"      # HTTP / gRPC API
      - "127.0.0.1:6334:6334"      # Internal gRPC
    volumes:
      - aether_qd_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333; echo -e 'GET /readyz HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3; grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - aether-infra
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redpanda ─────────────────────────────────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.2
    restart: always
    ports:
      - "127.0.0.1:9092:9092"      # Kafka API
      - "127.0.0.1:9644:9644"      # Admin REST API
      - "127.0.0.1:8082:8082"      # Pandaproxy
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - "1G"
      - --mode
      - production
      - --overprovisioned
      - --default-log-level
      - warn
      - --set
      - redpanda.auto_create_topics_enabled=false
      - --set
      - redpanda.enable_idempotence=true
      - --set
      - redpanda.enable_transactions=true
    volumes:
      - aether_rp_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -qi healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - aether-infra
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── MinIO ────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    restart: always
    ports:
      - "127.0.0.1:9000:9000"      # S3-compatible API
      - "127.0.0.1:9001:9001"      # Web console
    environment:
      MINIO_ROOT_USER: ${AETHER_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${AETHER_MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - aether_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - aether-infra
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


# ── Networks ──────────────────────────────────────────────────
networks:
  aether-infra:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1


# ── Named Volumes ─────────────────────────────────────────────
volumes:
  aether_pg_data:
  aether_ch_data:
  aether_redis_data:
  aether_qd_data:
  aether_rp_data:
  aether_minio_data:
