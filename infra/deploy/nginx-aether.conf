# ================================================================
# AETHER Terminal — Nginx Reverse Proxy Configuration
# EP-407: Routes external HTTPS traffic to internal AETHER
# services.  Only the gateway and webhook receivers are publicly
# reachable; all other services are loopback-only.
#
# Deployment: symlink into /etc/nginx/sites-available/ and
#   ln -s /etc/nginx/sites-available/aether.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# TLS certificates via certbot/ACME (managed out of band).
# See ENVIRONMENT.md for port assignments.
# ================================================================

upstream aether-gateway {
    server 127.0.0.1:8080;
    keepalive 64;
}

upstream aether-brain {
    server 127.0.0.1:8000;
    keepalive 16;
}

upstream aether-alerts {
    server 127.0.0.1:8002;
    keepalive 8;
}

upstream aether-inbox {
    server 127.0.0.1:8003;
    keepalive 8;
}

# ── HTTP -> HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name aether.example.com;

    # ACME challenge from certbot
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server block ────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aether.example.com;

    # TLS — replace with real cert paths
    ssl_certificate     /etc/letsencrypt/live/aether.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aether.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/aether.example.com/chain.pem;

    # Modern TLS configuration (Mozilla Intermediate, Jan 2025)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gateway — primary entry point ──────────────────────────
    # WebSocket upgrade
    location /ws {
        proxy_pass http://aether-gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST API
    location /api/ {
        proxy_pass http://aether-gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Gateway health (public-readable)
    location /healthz {
        proxy_pass http://aether-gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ── Brain API (internal tool use via gateway) ──────────────
    location /brain/ {
        proxy_pass http://aether-brain;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Alerts webhooks ────────────────────────────────────────
    # Inbound webhooks from Telegram/Discord/Slack/Twilio
    location /webhooks/alerts/ {
        proxy_pass http://aether-alerts;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Webhook payloads can be large
        client_max_body_size 32k;
    }

    # ── Inbox webhooks ─────────────────────────────────────────
    # Gmail Pub/Sub push and MS Graph webhook notifications
    location /webhooks/inbox/ {
        proxy_pass http://aether-inbox;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Pub/Sub push messages are small
        client_max_body_size 64k;
    }

    # ── Deny all other paths ───────────────────────────────────
    location / {
        return 404;
    }
}

# ── Admin/Metrics (internal network only) ────────────────────
server {
    listen 127.0.0.1:9100;
    server_name localhost;

    # Brain metrics
    location /metrics/brain {
        proxy_pass http://127.0.0.1:8000/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # LLM router metrics
    location /metrics/llm {
        proxy_pass http://127.0.0.1:8001/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Alerts metrics
    location /metrics/alerts {
        proxy_pass http://127.0.0.1:8002/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Inbox metrics
    location /metrics/inbox {
        proxy_pass http://127.0.0.1:8003/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Gateway metrics
    location /metrics/gateway {
        proxy_pass http://127.0.0.1:8080/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Catch-all: deny
    location / {
        return 404;
    }
}
